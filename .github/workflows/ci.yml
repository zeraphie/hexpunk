name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install:
    name: Install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/cache@v5
        id: bun-cache
        with:
          path: |
            node_modules
            showcase/node_modules
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - if: steps.bun-cache.outputs.cache-hit != 'true'
        run: bun install --frozen-lockfile
      - run: tar --zstd -cf node_modules.tar.zst node_modules showcase/node_modules
      - uses: actions/upload-artifact@v7
        with:
          name: node-modules-${{ github.sha }}
          retention-days: 1
          if-no-files-found: error
          path: node_modules.tar.zst

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with:
          name: node-modules-${{ github.sha }}
      - run: tar --zstd -xf node_modules.tar.zst
      - run: bun run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with:
          name: node-modules-${{ github.sha }}
      - run: tar --zstd -xf node_modules.tar.zst
      - run: bun run format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with:
          name: node-modules-${{ github.sha }}
      - run: tar --zstd -xf node_modules.tar.zst
      - run: bun run test

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [lint, format, test]
    if: github.ref == 'refs/heads/main'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
      - uses: oven-sh/setup-bun@v2
      - uses: actions/download-artifact@v8
        with:
          name: node-modules-${{ github.sha }}
      - run: tar --zstd -xf node_modules.tar.zst
      - run: bun run build:showcase
      - uses: actions/configure-pages@v6
      # Replace `actions/upload-pages-artifact@v5` with an equivalent
      # manual tar + `upload-artifact@v4` so we control retry semantics.
      # v5 of the pages-artifact wrapper re-uploads the artifact on
      # every transient API hiccup, leaving multiple `github-pages`
      # entries in the run and tripping deploy-pages' uniqueness check.
      # `overwrite: true` collapses any retry/rerun to one artifact.
      - run: |
          tar --dereference --hard-dereference \
            --directory dist/showcase \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            --exclude=.[^/]* \
            .
      - uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          overwrite: true
          if-no-files-found: error
      - id: deployment
        uses: actions/deploy-pages@v5
